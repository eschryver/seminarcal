name: Update Seminar Calendar

on:
  schedule:
    - cron: "0 6 * * *" # every day at 6:00 UTC (1:00 AM EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 ics

      - name: Run scraper
        run: seminarcal_scraper.py   # adjust to your actual filename

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seminars.ics
          git diff --cached --quiet || git commit -m "Update seminars.ics [skip ci]"
          git push